<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08091A" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="Road to the World Cup Final 2026 — live scores, bracket paths, venue hubs, and tournament intelligence." />
    <meta property="og:title" content="Road to the World Cup Final 2026" />
    <meta property="og:description" content="Live scores, qualification tracking, venue hubs, and tournament simulator for FIFA World Cup 2026™." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo/wc-trophy-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/logo/wc-trophy-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/logo/wc-trophy-mark.png" type="image/png" sizes="64x64" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WC 2026" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="WC 2026" />
    <meta name="msapplication-TileColor" content="#08091A" />
    <meta name="msapplication-TileImage" content="/icons/icon-512.png" />
    <link rel="icon" href="/og-image.png" type="image/png" />
    <title>Road to the World Cup Final 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("wc-color-scheme") || "system";
          var theme =
            pref === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.themePref = pref;
          document.documentElement.style.colorScheme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", theme === "light" ? "#F4F5FA" : "#08091A");
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
