services:
  postgres:
    image: postgres:16-alpine
    container_name: wc2026-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: world_cup_engine
    volumes:
      - wc2026_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d world_cup_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wc2026-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: wc2026-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  fifa-data:
    image: node:22-alpine
    container_name: wc2026-fifa-data
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../../fifa-public-api-mcp:/app
    command: sh -c "npm ci && npm run build && HOST=0.0.0.0 node build/httpServer.js"
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      HOST: "0.0.0.0"
      FIFA_WC_COMPETITION_ID: "17"
      FIFA_WC_SEASON_ID: "285023"

volumes:
  wc2026_pg_data:
